<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgPrimary: '#f8f9fc',
                        bgSecondary: '#ffffff',
                        bgTertiary: '#f1f3f9',
                        textPrimary: '#1a1d2e',
                        textSecondary: '#5b6178',
                        textMuted: '#9198af',
                        borderLight: '#eef1f7',
                        accentPrimary: '#6366f1',
                        accentSecondary: '#a855f7',
                        success: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#0ea5e9'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-bgPrimary text-textPrimary font-sans min-h-screen flex flex-col antialiased;
            }
        }
        @layer utilities {
            .gradient-text {
                @apply bg-clip-text text-transparent bg-gradient-to-br from-accentPrimary to-accentSecondary;
            }
            .btn {
                @apply inline-flex items-center gap-2 px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-300 transform;
            }
            .btn-primary {
                @apply bg-gradient-to-br from-accentPrimary to-accentSecondary text-white shadow-[0_4px_14px_rgba(99,102,241,0.3)] hover:shadow-[0_6px_20px_rgba(99,102,241,0.45)] hover:-translate-y-[1px];
            }
            .btn-secondary {
                @apply bg-white text-textPrimary border border-gray-200 shadow-sm hover:border-accentPrimary hover:text-accentPrimary hover:shadow-md;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="sticky top-0 z-[100] bg-white/85 backdrop-blur-[20px] transition-all duration-300 border-b border-transparent"
        id="main-nav">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/"
                class="flex items-center gap-2.5 no-underline text-textPrimary font-bold text-xl tracking-tight">
                <svg class="w-7 h-7 text-accentPrimary" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                        fill="currentColor" />
                </svg>
                <span>AttritionIQ</span>
            </a>

            <div class="hidden md:flex items-center gap-1 nav-links">
                <a href="/"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-md font-medium text-[0.9rem] transition-colors {% if request.endpoint == 'home' %}text-accentPrimary bg-accentPrimary/10{% else %}text-textSecondary hover:text-accentPrimary hover:bg-accentPrimary/5{% endif %}">
                    <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Home
                </a>
                <a href="/dashboard"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-md font-medium text-[0.9rem] transition-colors {% if request.endpoint == 'dashboard' %}text-accentPrimary bg-accentPrimary/10{% else %}text-textSecondary hover:text-accentPrimary hover:bg-accentPrimary/5{% endif %}">
                    <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
                <a href="/prediction"
                    class="flex items-center gap-1.5 px-4 py-2 rounded-md font-medium text-[0.9rem] transition-colors {% if request.endpoint == 'prediction' %}text-accentPrimary bg-accentPrimary/10{% else %}text-textSecondary hover:text-accentPrimary hover:bg-accentPrimary/5{% endif %}">
                    <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                    Prediction
                </a>
            </div>

            <button class="md:hidden flex flex-col gap-1.5 p-2 bg-transparent border-none cursor-pointer group"
                id="mobile-toggle" aria-label="Toggle navigation">
                <span
                    class="block w-[22px] h-[2px] bg-textPrimary rounded-sm transition-transform group-[.active]:translate-y-[8px] group-[.active]:rotate-45"></span>
                <span
                    class="block w-[22px] h-[2px] bg-textPrimary rounded-sm transition-opacity group-[.active]:opacity-0"></span>
                <span
                    class="block w-[22px] h-[2px] bg-textPrimary rounded-sm transition-transform group-[.active]:-translate-y-[8px] group-[.active]:-rotate-45"></span>
            </button>
        </div>

        <!-- Mobile Navigation Menu -->
        <div
            class="md:hidden hidden flex-col absolute top-16 left-0 right-0 bg-bgSecondary px-6 py-3 border-b border-gray-200 shadow-md nav-links-mobile">
            <a href="/"
                class="flex items-center gap-1.5 px-4 py-3 rounded-md font-medium text-[0.9rem] {% if request.endpoint == 'home' %}text-accentPrimary bg-accentPrimary/10{% else %}text-textSecondary hover:text-accentPrimary hover:bg-accentPrimary/5{% endif %}">
                Home
            </a>
            <a href="/dashboard"
                class="flex items-center gap-1.5 px-4 py-3 rounded-md font-medium text-[0.9rem] {% if request.endpoint == 'dashboard' %}text-accentPrimary bg-accentPrimary/10{% else %}text-textSecondary hover:text-accentPrimary hover:bg-accentPrimary/5{% endif %}">
                Dashboard
            </a>
            <a href="/prediction"
                class="flex items-center gap-1.5 px-4 py-3 rounded-md font-medium text-[0.9rem] {% if request.endpoint == 'prediction' %}text-accentPrimary bg-accentPrimary/10{% else %}text-textSecondary hover:text-accentPrimary hover:bg-accentPrimary/5{% endif %}">
                Prediction
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-bgSecondary border-t border-borderLight p-6 mt-auto">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-sm text-textMuted">&copy; 2026 AttritionIQ — Employee Attrition Prediction System</p>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const toggle = document.getElementById('mobile-toggle');
        const mobileNav = document.querySelector('.nav-links-mobile');
        if (toggle) {
            toggle.addEventListener('click', () => {
                toggle.classList.toggle('active');
                if (mobileNav.classList.contains('hidden')) {
                    mobileNav.classList.remove('hidden');
                    mobileNav.classList.add('flex');
                } else {
                    mobileNav.classList.add('hidden');
                    mobileNav.classList.remove('flex');
                }
            });
        }

        // Smooth scroll navbar shadow
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if (window.scrollY > 10) {
                nav.classList.add('border-gray-200', 'shadow-sm');
                nav.classList.remove('border-transparent');
            } else {
                nav.classList.remove('border-gray-200', 'shadow-sm');
                nav.classList.add('border-transparent');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
